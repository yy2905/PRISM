[[items]]
title = "Preferred Profiles of New Immigrants to NYC during the Migrant Influx of the 2020s: A Conjoint Experiment Revealing the Role of Legal Status in Public Opinion"
subtitle = "Conjoint experiment on migrant preferences, PAA 2026 Oral Session (Laam is the presenter)"
date = "Ongoing"
content = """
A collaborative project examining public attitudes toward new migrants in New York City. The study focuses on how legal status, skill level, family status, and perceived deservingness shape evaluations of migrants in a sanctuary-city context.
"""
